name: oikos-prod

services:
  # ── Reverse proxy + automatic HTTPS ─────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started

  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oikos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oikos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oikos} -d oikos"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed externally — only reachable within the Docker network

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Migrations (runs once, exits) ─────────────────────────────────────────────
  migrate:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile.prod
    command: sh -c "alembic upgrade head && python -m app.seeds.run_seeds"
    restart: no
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oikos}:${POSTGRES_PASSWORD}@db:5432/oikos
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-oikos}:${POSTGRES_PASSWORD}@db:5432/oikos

  # ── API (FastAPI) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-oikos}:${POSTGRES_PASSWORD}@db:5432/oikos
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-oikos}:${POSTGRES_PASSWORD}@db:5432/oikos
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-30}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Oikos}
      APP_BASE_URL: ${APP_BASE_URL}
      APP_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web (Next.js) ────────────────────────────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile.prod
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_started
    environment:
      API_URL: http://api:8000
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
