name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx turbo run lint
      - name: Type Check
        run: npx turbo run type-check

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Test (web)
        run: npx turbo run test --filter=web

  test-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: oikos
          POSTGRES_PASSWORD: oikos
          POSTGRES_DB: oikos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oikos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt

      - name: Install Python dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Write .env for tests
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=postgresql+asyncpg://oikos:oikos@localhost:5432/oikos_test
          DATABASE_SYNC_URL=postgresql+psycopg2://oikos:oikos@localhost:5432/oikos_test
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET_KEY=ci-test-secret-key-do-not-use-in-production
          JWT_ALGORITHM=HS256
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30
          JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
          EOF

      - name: Run API tests
        working-directory: apps/api
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage.xml
          retention-days: 14
