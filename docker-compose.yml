services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oikos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oikos}
      POSTGRES_DB: oikos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oikos -d oikos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://oikos:oikos@db:5432/oikos
      DATABASE_SYNC_URL: postgresql://oikos:oikos@db:5432/oikos
    volumes:
      - ./apps/api:/app

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://oikos:oikos@db:5432/oikos
      DATABASE_SYNC_URL: postgresql://oikos:oikos@db:5432/oikos
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/ui/node_modules
      - /app/packages/config/node_modules
      - /app/packages/types/node_modules

volumes:
  postgres_data:
